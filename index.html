<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --naranja:#E8651A;
    --naranja-dim:rgba(232,101,26,0.15);
    --naranja-dim2:rgba(232,101,26,0.08);
    --negro:#0f0f0f;
    --gris1:#1a1a1a;
    --gris2:#252525;
    --gris3:#333;
    --gris4:#555;
    --gris5:#888;
    --borde:#2e2e2e;
    --texto:#f0f0f0;
    --texto2:#aaa;
    --verde:#22c55e;
    --azul:#3b82f6;
    --radius:10px;
    --rsm:7px;
    --mono:'Barlow Condensed','Courier New',monospace;
    --sans:'Barlow',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body,.cf-root{font-family:var(--sans);background:var(--negro);color:var(--texto);margin:0;}
  .cf-root{min-height:100%;padding:0 16px 60px;user-select:none;}

  /* ── BRANDBAR ── */
  .cf-brandbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 0;border-bottom:2px solid var(--naranja);margin-bottom:18px;
    background:var(--negro);
  }
  .cf-brand-left{display:flex;align-items:center;gap:12px;}
  .logo-box{background:#fff;border-radius:var(--rsm);padding:5px 11px;display:flex;align-items:center;height:40px;}
  .logo-img{height:26px;width:auto;display:block;}
  .logo-fallback{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:.04em;color:#111;display:none;}
  .logo-fallback span{color:var(--naranja);}
  .cf-brand-tag{
    font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--gris5);
    letter-spacing:.14em;text-transform:uppercase;border-left:2px solid var(--borde);
    padding-left:10px;margin-left:2px;line-height:1.5;
  }
  .cf-brand-right{display:flex;align-items:center;gap:10px;}
  .cf-client-badge{display:flex;align-items:center;gap:8px;background:#fff;border-radius:var(--rsm);padding:6px 12px;box-shadow:0 2px 10px rgba(0,0,0,.35);}
  .cf-client-badge img{height:20px;display:block;}
  .cf-client-badge .lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:#8a97a0;letter-spacing:.08em;text-transform:uppercase;border-right:1px solid #e2e2e2;padding-right:8px;}
  #cfEditorBadge{font-family:'Barlow Condensed',sans-serif;font-size:11px;padding:3px 9px;border-radius:20px;letter-spacing:.06em;font-weight:700;}
  #cfSyncStatus{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--gris5);padding:3px 8px;letter-spacing:.04em;}

  /* ── HEADER / STATS ── */
  .cf-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;border-bottom:1px solid var(--borde);padding-bottom:18px;margin-bottom:16px;}
  .cf-title-block{display:flex;flex-direction:column;gap:4px;}
  .cf-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.18em;color:var(--naranja);text-transform:uppercase;font-weight:700;}
  .cf-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;letter-spacing:.01em;background:transparent;border:none;color:var(--texto);padding:0;outline:none;max-width:520px;}
  .cf-title:focus{border-bottom:1px dashed var(--naranja);}
  .cf-stats{display:flex;gap:0;}
  .cf-stat{font-family:'Barlow Condensed',sans-serif;padding:4px 18px;border-left:1px solid var(--borde);display:flex;flex-direction:column;gap:2px;min-width:110px;}
  .cf-stat:first-child{border-left:none;}
  .cf-stat .num{font-size:28px;font-weight:800;color:var(--texto);}
  .cf-stat.alert .num{color:var(--naranja);}
  .cf-stat .lbl{font-size:9px;letter-spacing:.1em;color:var(--texto2);text-transform:uppercase;font-weight:600;}

  /* ── CUADRILLAS PANEL ── */
  .cf-needpanel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .cf-needchip{
    font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
    border:1px solid var(--borde);border-radius:20px;
    padding:5px 12px;display:flex;align-items:center;gap:8px;
    background:var(--gris1);letter-spacing:.02em;
  }
  .cf-needchip .peak{font-size:16px;font-weight:800;color:var(--naranja);}

  /* ── TOOLBAR ── */
  .cf-toolbar-section{
    background:var(--gris1);border:1px solid var(--borde);border-radius:var(--radius);
    padding:12px 14px;margin-bottom:8px;display:flex;flex-direction:column;gap:10px;
  }
  .cf-toolbar-label{
    font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--gris5);font-weight:700;margin-bottom:4px;
    border-bottom:1px solid var(--borde);padding-bottom:6px;
  }
  .cf-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .cf-segmented{display:flex;border:1px solid var(--borde);border-radius:var(--rsm);overflow:hidden;}
  .cf-segmented button{
    background:transparent;border:none;color:var(--gris5);
    font-family:'Barlow Condensed',sans-serif;font-size:12px;
    text-transform:uppercase;letter-spacing:.08em;font-weight:700;
    padding:8px 14px;cursor:pointer;transition:all .15s;
  }
  .cf-segmented button.active{background:var(--naranja);color:#fff;}
  .cf-segmented.zoom button.active{background:var(--gris3);color:var(--texto);}
  .cf-segmented.nivel button.active{background:var(--gris2);color:var(--texto2);}
  .cf-field-inline{display:flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gris5);font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
  .cf-field-inline input[type=date]{
    background:var(--gris2);border:1px solid var(--borde);color:var(--texto);
    font-family:'Barlow Condensed',sans-serif;padding:6px 8px;border-radius:var(--rsm);font-size:12px;
  }
  .cf-field-inline input[type=date]:focus{border-color:var(--naranja);outline:none;}
  .cf-btn{
    font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;cursor:pointer;
    border:1px solid var(--naranja);background:var(--naranja-dim);color:var(--naranja);
    padding:8px 14px;border-radius:var(--rsm);transition:all .15s;letter-spacing:.05em;text-transform:uppercase;
  }
  .cf-btn:hover{background:var(--naranja);color:#fff;}
  .cf-btn.ghost{border-color:var(--borde);background:transparent;color:var(--gris5);}
  .cf-btn.ghost:hover{border-color:var(--gris5);color:var(--texto);}
  .cf-btn.mini{font-size:11px;padding:6px 10px;}
  .cf-hint{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--gris5);margin:0 0 12px;letter-spacing:.02em;}

  /* ── RANGO ── */
  .cf-rangebar{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    margin:0 0 10px;padding:10px 14px;
    border:1px solid var(--borde);border-radius:var(--rsm);background:var(--gris1);
    font-family:'Barlow Condensed',sans-serif;
  }

  /* ── GANTT ── */
  .cf-gantt-wrap{border:1px solid var(--borde);border-radius:var(--radius);overflow-x:auto;background:var(--gris2);}
  .cf-gantt{display:flex;min-width:max-content;}
  .cf-rowlabels{position:sticky;left:0;z-index:3;background:var(--negro);border-right:1px solid var(--borde);width:280px;flex-shrink:0;}
  .cf-rowlabel-h{height:44px;border-bottom:1px solid var(--borde);}
  .cf-grouphead{
    font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;color:#fff;padding:5px 12px;
    display:flex;align-items:center;font-weight:800;height:26px;
  }
  .cf-rowlabel{
    display:flex;align-items:center;gap:6px;padding:0 10px;border-bottom:1px solid var(--borde);
    font-family:'Barlow Condensed',sans-serif;font-size:12px;height:36px;letter-spacing:.02em;
  }
  .cf-rowlabel.sectorrow{height:32px;background:rgba(255,255,255,0.03);font-weight:700;font-size:12px;}
  .cf-rowlabel.parentrow{background:rgba(255,255,255,0.03);font-weight:700;}
  .cf-rowlabel.subrow{background:rgba(0,0,0,0.15);}
  .cf-rowlabel .peakbadge{margin-left:auto;font-size:10px;color:var(--naranja);border:1px solid var(--naranja);border-radius:20px;padding:1px 7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;}
  .cf-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .cf-toggle{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--gris5);font-size:10px;}
  .cf-toggle:hover{color:var(--naranja);}
  .cf-toggle.leaf{visibility:hidden;}
  .cf-rowlabel .rowname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:text;color:var(--texto);}
  .cf-rowlabel .rowname:hover{text-decoration:underline dotted;text-underline-offset:3px;color:var(--naranja);}
  .cf-rename-input{background:var(--gris2);border:1px solid var(--naranja);color:var(--texto);font-family:'Barlow Condensed',sans-serif;font-size:12px;padding:2px 5px;border-radius:2px;outline:none;width:100%;min-width:0;}
  .cf-addsub{margin-left:auto;opacity:0;width:18px;height:18px;border:1px solid var(--borde);border-radius:var(--rsm);background:transparent;color:var(--gris5);font-size:11px;cursor:pointer;line-height:1;flex-shrink:0;}
  .cf-rowlabel:hover .cf-addsub{opacity:1;}
  .cf-addsub:hover{border-color:var(--naranja);color:var(--naranja);}

  /* ── TIMELINE ── */
  .cf-timeline{position:relative;}
  .cf-weekrow{display:flex;height:44px;border-bottom:1px solid var(--borde);position:relative;z-index:2;background:var(--gris1);}
  .cf-week{flex-shrink:0;border-right:1px solid var(--borde);font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--gris5);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;line-height:1.25;overflow:hidden;letter-spacing:.04em;}
  .cf-week .sub{font-size:8.5px;opacity:.7;}
  .cf-week.today{background:var(--naranja-dim2);color:var(--naranja);font-weight:800;}
  .cf-week.weekend{background:rgba(0,0,0,.25);}
  .cf-groupspacer{border-bottom:1px solid var(--borde);height:26px;}
  .cf-track{position:relative;border-bottom:1px solid var(--borde);height:36px;}
  .cf-track.sectortrack{height:32px;background:rgba(255,255,255,.02);}
  .cf-track.parenttrack{background:rgba(255,255,255,.02);}
  .cf-track.subtrack{background:rgba(0,0,0,.15);}
  .cf-sector-summary{position:absolute;top:12px;height:7px;border-radius:4px;opacity:.6;pointer-events:none;}
  .cf-target-line{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed var(--naranja);z-index:2;pointer-events:none;}
  .cf-target-flag{position:absolute;top:-44px;transform:translateX(-50%);background:var(--naranja);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:9px;padding:2px 6px;border-radius:var(--rsm);white-space:nowrap;font-weight:800;letter-spacing:.06em;}
  .cf-todayline{position:absolute;top:0;bottom:0;width:0;border-left:1px solid rgba(232,101,26,.5);z-index:1;pointer-events:none;}

  /* ── BARRAS ── */
  .cf-bar{
    position:absolute;top:5px;height:26px;border-radius:var(--rsm);cursor:grab;
    display:flex;align-items:center;padding:0 9px;
    font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
    color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    border:none;border-left:3px solid rgba(0,0,0,.25);letter-spacing:.03em;
  }
  .cf-bar.parentbar{
    background:repeating-linear-gradient(135deg,rgba(255,255,255,.08) 0 6px,rgba(255,255,255,.02) 6px 12px);
    border:1.5px dashed var(--gris4);color:var(--texto2);font-weight:700;border-left:3px solid var(--gris4);
  }
  .cf-bar.dragging{opacity:.85;box-shadow:0 0 0 2px var(--naranja);z-index:10;}
  .cf-handle{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:4;}
  .cf-handle.left{left:-2px;} .cf-handle.right{right:-2px;}
  .cf-handle::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:12px;background:rgba(255,255,255,.4);border-radius:2px;}
  .cf-draghint{position:fixed;background:var(--gris1);border:1px solid var(--naranja);color:var(--texto);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:4px 10px;border-radius:var(--rsm);pointer-events:none;z-index:60;white-space:nowrap;letter-spacing:.04em;}

  /* ── LEYENDA ── */
  .cf-legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gris5);letter-spacing:.04em;}
  .cf-legend span{display:flex;align-items:center;gap:6px;}

  /* ── TABLA ── */
  .cf-listwrap{margin-top:26px;}
  .cf-list-h{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:.14em;color:var(--gris5);text-transform:uppercase;font-weight:700;margin-bottom:10px;border-top:1px solid var(--borde);padding-top:16px;}
  table.cf-table{width:100%;border-collapse:collapse;font-size:13px;}
  .cf-table th{text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--gris5);text-transform:uppercase;letter-spacing:.08em;font-weight:700;padding:6px 10px;border-bottom:1px solid var(--borde);}
  .cf-table td{padding:8px 10px;border-bottom:1px solid var(--borde);vertical-align:middle;font-family:'Barlow Condensed',sans-serif;font-size:13px;}
  .cf-table tr:hover td{background:rgba(232,101,26,.05);}
  .cf-chip{font-family:'Barlow Condensed',sans-serif;font-size:11px;padding:2px 8px;border-radius:20px;color:#fff;font-weight:700;display:inline-block;letter-spacing:.03em;}
  .cf-row-actions{display:flex;gap:6px;}
  .cf-icon-btn{background:transparent;border:1px solid var(--borde);color:var(--gris5);width:26px;height:26px;border-radius:var(--rsm);cursor:pointer;font-size:12px;}
  .cf-icon-btn:hover{border-color:var(--naranja);color:var(--naranja);}
  .cf-icon-btn.del:hover{border-color:#ef4444;color:#ef4444;}
  .cf-empty{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--gris5);padding:30px 10px;text-align:center;letter-spacing:.04em;}

  /* ── MODAL ── */
  .cf-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px);}
  .cf-modal{background:var(--gris1);border-radius:18px 18px 0 0;border-top:2px solid var(--naranja);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 18px 40px;animation:slideUp .22s ease;}
  @keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
  .cf-modal h3{font-family:'Barlow Condensed',sans-serif;margin:0 0 4px;font-size:22px;font-weight:800;letter-spacing:.03em;}
  .cf-modal .ctx{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--gris5);margin-bottom:16px;letter-spacing:.04em;text-transform:uppercase;}
  .cf-form-row{margin-bottom:12px;display:flex;flex-direction:column;gap:5px;}
  .cf-form-row label{font-family:'Barlow Condensed',sans-serif;font-size:10px;color:var(--gris5);text-transform:uppercase;letter-spacing:.08em;font-weight:700;}
  .cf-form-row input,.cf-form-row select,.cf-form-row textarea{background:var(--gris2);border:1px solid var(--borde);color:var(--texto);padding:10px 12px;border-radius:var(--rsm);font-family:'Barlow',sans-serif;font-size:15px;outline:none;width:100%;}
  .cf-form-row input:focus,.cf-form-row select:focus,.cf-form-row textarea:focus{border-color:var(--naranja);}
  .cf-form-row-2{display:flex;gap:10px;}
  .cf-form-row-2 .cf-form-row{flex:1;}
  .cf-modal-actions{display:flex;justify-content:space-between;gap:8px;margin-top:18px;}
  .cf-modal-actions .right{display:flex;gap:8px;}
  .cf-loading{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--gris5);padding:20px;letter-spacing:.04em;}

  /* ── COLORES CUADRILLAS (sobre fondos oscuros necesitan ser vivos) ── */
  :root{
    --c-suelo:#D97706;
    --c-encofrado:#3B82F6;
    --c-hormigon:#6B7280;
    --c-detalle:#16A34A;
    --g-isbl:#3B82F6;
    --g-osbl:#D97706;
    --g-mant:#16A34A;
  }

  /* ── TEMA CLARO ── */
  [data-theme="light"]{
    --naranja:#D9540A;
    --naranja-dim:rgba(217,84,10,0.12);
    --naranja-dim2:rgba(217,84,10,0.07);
    --negro:#f0f0f0;
    --gris1:#ffffff;
    --gris2:#e8e8e8;
    --gris3:#d0d0d0;
    --gris4:#b0b0b0;
    --gris5:#666666;
    --borde:#cccccc;
    --texto:#111111;
    --texto2:#444444;
    --c-suelo:#92400E;
    --c-encofrado:#1E40AF;
    --c-hormigon:#374151;
    --c-detalle:#15803D;
    --g-isbl:#1E40AF;
    --g-osbl:#92400E;
    --g-mant:#15803D;
  }
  [data-theme="light"] body,[data-theme="light"] .cf-root{ background:var(--negro); color:var(--texto); }
  [data-theme="light"] .cf-brandbar{ background:var(--negro); }
  [data-theme="light"] .cf-rowlabels{ background:var(--negro); }
  [data-theme="light"] .cf-gantt-wrap{ background:var(--gris2); }
  [data-theme="light"] .cf-weekrow{ background:var(--gris1); }
  [data-theme="light"] .cf-week.weekend{ background:rgba(0,0,0,.05); }
  [data-theme="light"] .cf-week.today{ background:var(--naranja-dim2); }
  [data-theme="light"] .cf-rowlabels,.cf-rowlabel{ color:var(--texto); }
  [data-theme="light"] .cf-rowlabel.sectorrow{ background:rgba(0,0,0,.03); }
  [data-theme="light"] .cf-rowlabel.subrow{ background:rgba(0,0,0,.06); }
  [data-theme="light"] .cf-rowlabel.parentrow{ background:rgba(0,0,0,.03); }
  [data-theme="light"] .cf-rowlabel .rowname{ color:var(--texto); }
  [data-theme="light"] .cf-track.sectortrack{ background:rgba(0,0,0,.02); }
  [data-theme="light"] .cf-track.subtrack{ background:rgba(0,0,0,.05); }
  [data-theme="light"] .cf-bar{ color:#fff; }
  [data-theme="light"] .cf-bar.parentbar{ color:var(--texto2); border-color:var(--gris4); background:repeating-linear-gradient(135deg,rgba(0,0,0,.06) 0 6px,rgba(0,0,0,.02) 6px 12px); }
  [data-theme="light"] .cf-modal{ background:var(--gris1); }
  [data-theme="light"] .cf-toolbar-section{ background:var(--gris1); box-shadow:0 1px 3px rgba(0,0,0,.08); }
  [data-theme="light"] .cf-needchip{ background:var(--gris1); }
  [data-theme="light"] .cf-table tr:hover td{ background:rgba(217,84,10,.05); }
  [data-theme="light"] .theme-toggle-btn{ background:var(--gris2); }
  /* ── REPORTE / PRINT ── */
  .reporte-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;
    display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;}
  .reporte-overlay.open{display:flex;}
  .reporte-modal{background:var(--gris1,#1a1a1a);border:1px solid var(--borde,#2e2e2e);
    border-top:3px solid var(--naranja,#E8651A);border-radius:12px;
    width:100%;max-width:560px;padding:24px;margin:auto;}
  .reporte-modal h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;
    margin:0 0 18px;letter-spacing:.03em;}
  .reporte-section{margin-bottom:16px;}
  .reporte-section-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;
    font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--gris5,#888);
    margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--borde,#2e2e2e);}
  .reporte-checks{display:flex;flex-direction:column;gap:8px;}
  .reporte-check{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 12px;
    border:1px solid var(--borde,#2e2e2e);border-radius:7px;transition:border-color .15s;
    background:var(--gris2,#252525);}
  .reporte-check:hover{border-color:var(--naranja,#E8651A);}
  .reporte-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--naranja,#E8651A);cursor:pointer;}
  .reporte-check span{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
    color:var(--texto,#f0f0f0);}
  .reporte-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .reporte-field{display:flex;flex-direction:column;gap:5px;}

<script>

// ════════════════════════════════════════
//  REPORTE PDF
// ════════════════════════════════════════
function mostrarDetalleTask(task, evt){
  var panel = document.getElementById('taskDetailPanel');
  if(!panel){
    panel = document.createElement('div');
    panel.id = 'taskDetailPanel';
    panel.style.cssText = 'position:fixed;z-index:400;background:var(--gris1,#1a1a1a);'
      +'border:1px solid var(--borde,#2e2e2e);border-top:3px solid var(--naranja,#E8651A);'
      +'border-radius:10px;padding:16px;max-width:340px;min-width:240px;'
      +'box-shadow:0 8px 32px rgba(0,0,0,.5);font-family:Barlow Condensed,sans-serif;';
    document.body.appendChild(panel);
    document.addEventListener('click', function(e){
      if(!panel.contains(e.target) && !e.target.closest('.cf-bar')) panel.style.display='none';
    });
  }
  var x = evt.clientX+12, y = evt.clientY+12;
  if(x+360>window.innerWidth) x=evt.clientX-360;
  if(y+300>window.innerHeight) y=evt.clientY-300;
  panel.style.left=x+'px'; panel.style.top=y+'px'; panel.style.display='block';

  var cuadNombre='';
  var colores={suelo:'#D97706',encofrado:'#3B82F6',hormigon:'#6B7280',detalle:'#16A34A'};
  var color='#888';
  if(task.cuadrilla && window._stateRef){
    var cuad=(window._stateRef.cuadrillas||[]).find(function(c){return c.id===task.cuadrilla;});
    if(cuad){cuadNombre=cuad.nombre; color=colores[task.cuadrilla]||'#888';}
  }

  // Construir con DOM en vez de strings para evitar problemas de comillas
  panel.innerHTML='';

  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;';
  var tit=document.createElement('div');
  tit.style.cssText='font-size:16px;font-weight:800;color:var(--texto,#f0f0f0);line-height:1.2;max-width:260px;';
  tit.textContent=task.nombre;
  var cls=document.createElement('button');
  cls.textContent='✕';
  cls.style.cssText='background:none;border:none;color:#888;cursor:pointer;font-size:18px;padding:0 0 0 8px;';
  cls.onclick=function(){panel.style.display='none';};
  hdr.appendChild(tit); hdr.appendChild(cls); panel.appendChild(hdr);

  // Badge cuadrilla
  if(cuadNombre){
    var badge=document.createElement('div');
    badge.style.cssText='display:inline-block;background:'+color+'22;border:1px solid '+color+'55;color:'+color+';border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;margin-bottom:10px;';
    badge.textContent=cuadNombre;
    panel.appendChild(badge);
  }

  // Grid de datos
  var grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;';
  function addCell(label,val,color2){
    var cell=document.createElement('div');
    var lbl=document.createElement('div');
    lbl.style.cssText='font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;';
    lbl.textContent=label;
    var v=document.createElement('div');
    v.style.cssText='font-size:14px;font-weight:700;color:'+(color2||'var(--texto,#f0f0f0)')+';';
    v.textContent=val;
    cell.appendChild(lbl); cell.appendChild(v); grid.appendChild(cell);
  }
  addCell('Inicio', fmtDateES(task.inicio));

  panel.appendChild(grid);

  // Maquinaria
  if(task.maquinas && task.maquinas.length){
    var maqSec=document.createElement('div');
    maqSec.style.marginBottom='8px';
    var maqLbl=document.createElement('div');

    task.maquinas.forEach(function(m){
      var row=document.createElement('div');
      row.style.cssText='font-size:12px;color:var(--texto2,#aaa);';
      row.textContent='· '+m.cant+'× '+m.tipo;
      maqSec.appendChild(row);
    });
    panel.appendChild(maqSec);
  }

  // Descripción
  if(task.descripcion){
    var dSec=document.createElement('div');
    dSec.style.marginBottom='8px';
    var dLbl=document.createElement('div');
    dLbl.style.cssText='font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;';
    dLbl.textContent='Descripción';
    var dVal=document.createElement('div');
    dVal.style.cssText='font-size:12px;color:var(--texto2,#aaa);line-height:1.4;';
    dVal.textContent=task.descripcion;
    dSec.appendChild(dLbl); dSec.appendChild(dVal); panel.appendChild(dSec);
  }

  // Notas
  if(task.notas){
    var nSec=document.createElement('div');
    var nLbl=document.createElement('div');
    nLbl.style.cssText='font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;';
    nLbl.textContent='Notas';
    var nVal=document.createElement('div');
    nVal.style.cssText='font-size:12px;color:var(--naranja,#E8651A);line-height:1.4;';
    nVal.textContent=task.notas;
    nSec.appendChild(nLbl); nSec.appendChild(nVal); panel.appendChild(nSec);
  }
}

function buildGanttSVG(tareas, desde, hasta){
  if(!tareas || tareas.length === 0) return '';

  // Calcular rango de fechas
  var minD = desde ? new Date(desde+'T00:00:00') : new Date(tareas.reduce(function(m,t){ return t.inicio < m ? t.inicio : m; }, tareas[0].inicio)+'T00:00:00');
  var maxD = hasta ? new Date(hasta+'T00:00:00') : new Date(tareas.reduce(function(m,t){ return t.fin > m ? t.fin : m; }, tareas[0].fin)+'T00:00:00');

  var totalDays = Math.round((maxD - minD) / 86400000) + 1;
  if(totalDays < 1) totalDays = 1;

  // Dimensiones SVG (A4 landscape: ~780px útiles)
  var LABEL_W = 180;
  var CHART_W = 580;
  var ROW_H = 22;
  var HEADER_H = 36;
  var colores = {suelo:'#D97706', encofrado:'#3B82F6', hormigon:'#6B7280', detalle:'#16A34A'};

  // Filtrar solo tareas raíz y sus hijos directos (2 niveles)
  var rootTasks = tareas.filter(function(t){ return !t.parentId; });
  var rows = [];
  rootTasks.forEach(function(t){
    rows.push({task:t, depth:0});
    if(!t.collapsed){
      tareas.filter(function(c){ return c.parentId === t.id; }).forEach(function(c){
        rows.push({task:c, depth:1});
      });
    }
  });

  var SVG_H = HEADER_H + rows.length * ROW_H + 10;
  var SVG_W = LABEL_W + CHART_W;

  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="'+SVG_W+'" height="'+SVG_H+'" '
    +'style="font-family:Barlow Condensed,Arial,sans-serif;background:#fff;">';

  // Fondo header
  svg += '<rect x="0" y="0" width="'+SVG_W+'" height="'+HEADER_H+'" fill="#1a1a2e"/>';

  // Columnas de mes en el header
  var months = [];
  var d = new Date(minD);
  while(d <= maxD){
    var key = d.getFullYear()+'-'+(d.getMonth()+1);
    if(!months.length || months[months.length-1].key !== key){
      months.push({key:key, date: new Date(d), dayIndex: Math.round((d - minD)/86400000)});
    }
    d.setDate(d.getDate()+7);
  }

  months.forEach(function(m, i){
    var x = LABEL_W + (m.dayIndex / totalDays) * CHART_W;
    var nextX = (i+1 < months.length)
      ? LABEL_W + (months[i+1].dayIndex / totalDays) * CHART_W
      : SVG_W;
    var label = m.date.toLocaleDateString('es-AR',{month:'short',year:'2-digit'}).toUpperCase();
    svg += '<rect x="'+x+'" y="0" width="'+(nextX-x)+'" height="'+HEADER_H+'" fill="none" stroke="#2a2a4a" stroke-width="0.5"/>';
    svg += '<text x="'+(x+6)+'" y="22" fill="#aaa" font-size="10" font-weight="700" letter-spacing="0.08em">'+label+'</text>';
  });

  // Línea "hoy"
  var today = new Date();
  var todayX = LABEL_W + (Math.round((today - minD)/86400000) / totalDays) * CHART_W;
  if(todayX >= LABEL_W && todayX <= SVG_W){
    svg += '<line x1="'+todayX+'" y1="0" x2="'+todayX+'" y2="'+SVG_H+'" stroke="#E8651A" stroke-width="1" stroke-opacity="0.5"/>';
    svg += '<text x="'+(todayX+2)+'" y="32" fill="#E8651A" font-size="8" font-weight="700">HOY</text>';
  }

  // Filas
  rows.forEach(function(row, i){
    var t = row.task;
    var y = HEADER_H + i * ROW_H;
    var isParent = row.depth === 0;

    // Fondo alternado
    svg += '<rect x="0" y="'+y+'" width="'+SVG_W+'" height="'+ROW_H
      +'" fill="'+(isParent ? '#f8f8f8' : (i%2===0?'#fff':'#fafafa'))+'"/>';

    // Línea separadora
    svg += '<line x1="0" y1="'+(y+ROW_H)+'" x2="'+SVG_W+'" y2="'+(y+ROW_H)+'" stroke="#eeeeee" stroke-width="0.5"/>';

    // Label
    var labelX = 8 + row.depth * 14;
    var labelText = t.nombre.length > 26 ? t.nombre.slice(0,25)+'…' : t.nombre;
    svg += '<text x="'+labelX+'" y="'+(y+14)+'" fill="'+(isParent?'#111':'#444')+'" '
      +'font-size="'+(isParent?'10':'9')+'" font-weight="'+(isParent?'700':'400')+'" '
      +'text-anchor="start">'+escHGlob(labelText)+'</text>';

    // Separador label/chart
    svg += '<line x1="'+LABEL_W+'" y1="'+y+'" x2="'+LABEL_W+'" y2="'+(y+ROW_H)+'" stroke="#ddd" stroke-width="0.5"/>';

    // Barra
    if(t.inicio && t.fin){
      var startDay = Math.round((new Date(t.inicio+'T00:00:00') - minD) / 86400000);
      var lenDays = Math.round((new Date(t.fin+'T00:00:00') - new Date(t.inicio+'T00:00:00')) / 86400000) + 1;
      var barX = LABEL_W + Math.max(0, (startDay / totalDays) * CHART_W);
      var barW = Math.max(4, (lenDays / totalDays) * CHART_W);
      // No salirse del chart
      if(barX + barW > SVG_W) barW = SVG_W - barX;

      var barColor = isParent ? '#94a3b8' : (colores[t.cuadrilla] || '#64748b');
      var barH = isParent ? 8 : 12;
      var barY = y + (ROW_H - barH) / 2;

      if(isParent){
        // Barra padre: outline
        svg += '<rect x="'+barX+'" y="'+barY+'" width="'+barW+'" height="'+barH
          +'" fill="'+barColor+'33" stroke="'+barColor+'" stroke-width="1" rx="2"/>';
      } else {
        svg += '<rect x="'+barX+'" y="'+barY+'" width="'+barW+'" height="'+barH
          +'" fill="'+barColor+'" rx="2" opacity="0.9"/>';
        // Label en la barra si hay espacio
        if(barW > 40){
          var bLabel = t.nombre.length > 16 ? t.nombre.slice(0,15)+'…' : t.nombre;
          svg += '<text x="'+(barX+4)+'" y="'+(barY+barH-2)+'" fill="#fff" '
            +'font-size="8" font-weight="700">'+escHGlob(bLabel)+'</text>';
        }
      }
    }
  });

  // Marco exterior
  svg += '<rect x="0" y="0" width="'+SVG_W+'" height="'+SVG_H+'" fill="none" stroke="#ddd" stroke-width="0.5"/>';
  svg += '<line x1="'+LABEL_W+'" y1="0" x2="'+LABEL_W+'" y2="'+SVG_H+'" stroke="#ccc" stroke-width="1"/>';

  svg += '</svg>';
  return svg;
}

function generarReporte(){
  var desde=document.getElementById('rpDesde').value;
  var hasta=document.getElementById('rpHasta').value;
  var inclGantt=document.getElementById('rpGantt').checked;
  var inclTabla=document.getElementById('rpTabla').checked;
  var inclCuad=document.getElementById('rpCuad').checked;
  var inclMaq=document.getElementById('rpMaq').checked;
  var inclOS=document.getElementById('rpOS').checked;

  var st=window._stateRef;
  if(!st){alert('No hay datos cargados.');return;}

  var tareas=st.tasks.filter(function(t){
    if(!t.inicio||!t.fin)return false;
    if(desde&&t.fin<desde)return false;
    if(hasta&&t.inicio>hasta)return false;
    return true;
  });

  // Armar el HTML del reporte
  var now=new Date();
  var fechaGen=now.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Logo base64 desde el INGEMAX_SVG
  var logoHtml='<div style="font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:800;color:#E8651A;">INGEMAX S.A.</div>';

  var html='<div class="ps-header">'
    +'<div>'
    +'<div class="ps-proyecto">'+escHGlob(st.proyecto||'Alcoenergy — Obra Civil')+'</div>'
    +'<div class="ps-sub">Cronograma de Obra Civil · INGEMAX S.A.</div>'
    +'</div>'
    +'<div class="ps-meta">'
    +'Generado: '+fechaGen+'<br>'
    +(desde||'inicio')+' → '+(hasta||'fin')+'<br>'
    +'<strong>'+tareas.length+' actividades</strong>'
    +'</div>'
    +'</div>';

  // ── TABLA DE ACTIVIDADES ──
  if(inclTabla && tareas.length>0){
    var colores={suelo:'#D97706',encofrado:'#3B82F6',hormigon:'#6B7280',detalle:'#16A34A'};
    html+='<div class="ps-section"><div class="ps-section-title">Actividades y Subactividades</div>'
      +'<table class="ps-table">'
      +'<thead><tr><th>Actividad</th><th>Sector</th><th>Cuadrilla</th><th>Inicio</th><th>Fin</th><th>Duración</th><th>Personas</th></tr></thead>'
      +'<tbody>';
    tareas.forEach(function(t){
      var dur=Math.round((new Date(t.fin)-new Date(t.inicio))/(1000*60*60*24))+1;
      var color=t.cuadrilla?colores[t.cuadrilla]||'#888':'#ccc';
      var indent=t.parentId?'padding-left:16px;':'font-weight:700;';
      html+='<tr>'
        +'<td style="'+indent+'">'+escHGlob(t.nombre)+'</td>'
        +'<td style="font-size:9px;color:#888;">'+escHGlob(t.sector||'')+'</td>'
        +'<td>'+(t.cuadrilla?'<span class="ps-chip" style="background:'+color+'22;color:'+color+';">'+escHGlob(t.cuadrilla)+'</span>':'—')+'</td>'
        +'<td>'+fmtDateES(t.inicio)+'</td>'
        +'<td>'+fmtDateES(t.fin)+'</td>'
        +'<td style="text-align:center;">'+dur+' días</td>'
        +'<td style="text-align:center;">'+(t.personas||'—')+'</td>'
        +'</tr>';
    });
    html+='</tbody></table></div>';
  }

  // ── GANTT SVG ──
  if(inclGantt && tareas.length>0){
    var minD=desde||tareas.reduce(function(m,t){return t.inicio<m?t.inicio:m;},tareas[0].inicio);
    var maxD=hasta||tareas.reduce(function(m,t){return t.fin>m?t.fin:m;},tareas[0].fin);
    var totalMs=new Date(maxD)-new Date(minD);
    var totalDias=Math.ceil(totalMs/86400000)+1;
    var LABEL_W=180, BAR_H=14, ROW_H=20, HEADER_H=30;
    var CHART_W=580;
    var colores={suelo:'#D97706',encofrado:'#3B82F6',hormigon:'#6B7280',detalle:'#16A34A'};

    var svgRows='';
    var y=HEADER_H;
    // Agrupar por sector
    var sectoresVistos={};
    tareas.forEach(function(t){
      if(!sectoresVistos[t.sector]){
        sectoresVistos[t.sector]=true;
        // Header de sector
        svgRows+='<rect x="0" y="'+y+'" width="'+(LABEL_W+CHART_W)+'" height="'+ROW_H+'" fill="#1a1a2e"/>';
        svgRows+='<text x="8" y="'+(y+14)+'" font-family="Barlow Condensed,sans-serif" font-size="10" font-weight="800" fill="#A78BFA" letter-spacing="1">'+escHGlob(t.sector.toUpperCase())+'</text>';
        y+=ROW_H;
      }
      // Fila tarea
      var bg=t.parentId?'#f8f8f8':'#f0f0f0';
      svgRows+='<rect x="0" y="'+y+'" width="'+(LABEL_W+CHART_W)+'" height="'+ROW_H+'" fill="'+bg+'"/>';
      var indent=t.parentId?12:4;
      var label=t.nombre.length>22?t.nombre.slice(0,22)+'…':t.nombre;
      svgRows+='<text x="'+(indent)+'" y="'+(y+13)+'" font-family="Barlow Condensed,sans-serif" font-size="'+(t.parentId?9:10)+'" font-weight="'+(t.parentId?'400':'700')+'" fill="#333">'+escHGlob(label)+'</text>';
      // Barra
      var startMs=new Date(t.inicio)-new Date(minD);
      var durMs=new Date(t.fin)-new Date(t.inicio)+86400000;
      var bx=LABEL_W+Math.round((startMs/totalMs)*CHART_W);
      var bw=Math.max(Math.round((durMs/totalMs)*CHART_W),4);
      var bColor=t.cuadrilla?colores[t.cuadrilla]||'#888':'#ccc';
      svgRows+='<rect x="'+bx+'" y="'+(y+3)+'" width="'+bw+'" height="'+BAR_H+'" rx="2" fill="'+bColor+'" opacity="0.85"/>';
      if(t.m3) svgRows+='<text x="'+(bx+3)+'" y="'+(y+13)+'" font-family="Barlow Condensed,sans-serif" font-size="8" font-weight="800" fill="#fff">'+t.m3+'m³</text>';
      y+=ROW_H;
    });
    var totalH=y+10;

    // Header de fechas
    var headerCells='';
    var stepDias=Math.ceil(totalDias/8);
    for(var di=0;di<=totalDias;di+=stepDias){
      var dx=LABEL_W+Math.round((di/totalDias)*CHART_W);
      var dLabel=new Date(new Date(minD).getTime()+di*86400000);
      var dStr=(dLabel.getDate())+'/'+(dLabel.getMonth()+1);
      headerCells+='<line x1="'+dx+'" y1="0" x2="'+dx+'" y2="'+totalH+'" stroke="#ddd" stroke-width="0.5"/>';
      headerCells+='<text x="'+dx+'" y="20" font-family="Barlow Condensed,sans-serif" font-size="9" fill="#888" text-anchor="middle">'+dStr+'</text>';
    }

    var svg='<svg width="'+(LABEL_W+CHART_W)+'" height="'+totalH+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+(LABEL_W+CHART_W)+'px;">'
      +'<rect width="'+(LABEL_W+CHART_W)+'" height="'+totalH+'" fill="#fff"/>'
      +headerCells+svgRows+'</svg>';

    html+='<div class="ps-section" style="page-break-before:always;"><div class="ps-section-title">Cronograma — Vista Gantt</div>'+svg+'</div>';
  }

  // ── CUADRILLAS ──
  if(inclCuad && st.cuadrillas){
    html+='<div class="ps-section"><div class="ps-section-title">Cuadrillas — Pico de Simultaneidad</div>'
      +'<div class="ps-crew-grid">';
    st.cuadrillas.forEach(function(c){
      // Calcular pico
      var activas=tareas.filter(function(t){return t.cuadrilla===c.id;});
      var pico=0;
      activas.forEach(function(t1){
        var simult=activas.filter(function(t2){return t2.inicio<=t1.inicio&&t2.fin>=t1.inicio;}).length;
        if(simult>pico)pico=simult;
      });
      html+='<div class="ps-crew-card">'
        +'<div class="ps-crew-peak">'+pico+'</div>'
        +'<div class="ps-crew-name">'+escHGlob(c.nombre)+'</div>'
        +'</div>';
    });
    html+='</div></div>';
  }

  // ── MÁQUINAS ──
  if(inclMaq){
    var maqMap={};
    tareas.forEach(function(t){
      (t.maquinas||[]).forEach(function(m){
        if(!maqMap[m.tipo])maqMap[m.tipo]=0;
        maqMap[m.tipo]=Math.max(maqMap[m.tipo],m.cant);
      });
    });
    var tipos=Object.keys(maqMap);
    if(tipos.length>0){
      html+='<div class="ps-section"><div class="ps-section-title">Maquinaria — Máximo Simultáneo</div>'
        +'<table class="ps-table"><thead><tr><th>Equipo</th><th>Cant. máx.</th></tr></thead><tbody>';
      tipos.forEach(function(tipo){
        html+='<tr><td>'+escHGlob(tipo)+'</td><td style="text-align:center;font-weight:800;">'+maqMap[tipo]+'</td></tr>';
      });
      html+='</tbody></table></div>';
    }
  }

  // ── ÓRDENES DE SERVICIO ──
  if(inclOS && typeof ORDENES_SERVICIO!=='undefined'){
    html+='<div class="ps-section"><div class="ps-section-title">Órdenes de Servicio INGEMAX</div>';
    ORDENES_SERVICIO.forEach(function(os){
      html+='<div class="ps-os-row">'
        +'<span class="ps-os-num">'+os.id+'</span>'
        +'<span class="ps-os-nombre">'+escHGlob(os.nombre)+'</span>'
        +(os.inicio?'<span style="font-size:9px;color:#888;white-space:nowrap;">'+fmtDateES(os.inicio)+(os.fin&&os.fin!==os.inicio?' → '+fmtDateES(os.fin):'')+'</span>':'')
        +'<span class="ps-os-estado '+os.estado+'">'+( os.estado==='realizado'?'Realizado':os.estado==='pendiente'?'Pendiente':'Sin fecha')+'</span>'
        +'</div>';
    });
    html+='</div>';
  }

  // ── GANTT SVG ──
  if(inclGantt && tareas.length>0){
    var ganttSvg = buildGanttSVG(tareas, desde, hasta);
    html += '<div class="ps-section">'
      +'<div class="ps-section-title">Cronograma Visual</div>'
      +'<div style="width:100%;overflow:hidden;">'+ganttSvg+'</div>'
      +'</div>';
  }

  // Pie de página
  html+='<div style="margin-top:30px;padding-top:10px;border-top:1px solid #eee;'
    +'font-size:9px;color:#aaa;display:flex;justify-content:space-between;">'
    +'<span>INGEMAX S.A. — Sistema de Gestión de Obra Civil</span>'
    +'<span>'+escHGlob(st.proyecto||'Alcoenergy')+'</span>'
    +'</div>';

  // Mostrar en printSheet y ejecutar print
  var sheet=document.getElementById('printSheet');
  sheet.innerHTML=html;
  sheet.style.display='block';
  cerrarReporte();

  // Dar tiempo al browser para renderizar
  setTimeout(function(){
    window.print();
    // Después de imprimir, ocultar la hoja
    setTimeout(function(){ sheet.style.display='none'; }, 500);
  }, 300);
}

function fmtDateES(str){
  if(!str)return '—';
  var parts=str.split('-');
  if(parts.length!==3)return str;
  return parts[2]+'/'+parts[1]+'/'+parts[0];
}

        var lnk=document.createElement('a');
        lnk.href=p.url; lnk.target='_blank';

        lnk.textContent='Abrir ↗';
        row.appendChild(icon); row.appendChild(nom); row.appendChild(lnk);
        if(window.IS_EDITOR_GLOBAL){
          var del=document.createElement('button');
          del.textContent='✕'; del.title='Eliminar';
          del.style.cssText='background:none;border:none;color:#888;cursor:pointer;font-size:14px;padding:3px 7px;border-radius:4px;';
          del.onmouseover=function(){this.style.color='#ef4444';};
          del.onmouseout=function(){this.style.color='#888';};

            var sp2=window._stateRef.planos.filter(function(p){return p.sector===sid;});
            var target=sp2[idx];
            window._stateRef.planos=window._stateRef.planos.filter(function(p){return p!==target;});
            if(typeof save==='function')save();
            renderPlanos();
          };})(s.id,i);
          row.appendChild(del);
        }
        blk.appendChild(row);
      });
      c.appendChild(blk);
    });
  });

    var emp=document.createElement('div');
    emp.style.cssText='color:#888;padding:20px;text-align:center;font-family:Barlow Condensed,sans-serif;';
    emp.textContent='No hay planos cargados aún. Usá el botón + para agregar.';

  }

function addPlano(sid){
  var n=document.getElementById('pN_'+sid),u=document.getElementById('pU_'+sid),t=document.getElementById('pT_'+sid);
  if(!n||!u)return;
  var nombre=n.value.trim(),url=u.value.trim(),tipo=t?t.value:'PDF';
  if(!nombre||!url){alert('Completa nombre y link.');return;}
  if(!window._stateRef.planos)window._stateRef.planos=[];
  window._stateRef.planos.push({sector:sid,nombre:nombre,url:url,tipo:tipo});
  n.value=''; u.value='';
  if(typeof save==='function')save();
  renderPlanos();
}
function delPlano(sid,idx){
  if(!window._stateRef||!window._stateRef.planos)return;
  if(!confirm('Eliminar este plano?'))return;
  var sp=window._stateRef.planos.filter(function(p){return p.sector===sid;});
  var target=sp[idx];
  window._stateRef.planos=window._stateRef.planos.filter(function(p){return p!==target;});
  if(typeof save==='function')save();
  renderPlanos();
}
function escHGlob(s){return String(s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

let _modalMaquinas = []; // array temporal mientras el modal está abierto

function renderMaqList(){
  const list = document.getElementById('mMaqList');
  if(!list) return;
  // Sugerir tipos ya usados
  const suggest = document.getElementById('maqSuggest');
  if(suggest){
    const tipos = [...new Set(
      (typeof state !== 'undefined' ? state.tasks : [])
        .flatMap(t=>(t.maquinas||[]).map(m=>m.tipo))
        .filter(Boolean)
    )];
    suggest.innerHTML = tipos.map(t=>`<option value="${t}">`).join('');
  }
  list.innerHTML = _modalMaquinas.length === 0
    ? '<div style="font-size:12px;color:#888;padding:4px 0;">Sin máquinas asignadas</div>'
    : _modalMaquinas.map((m,i)=>`
        <div class="cf-maq-item">
          <span class="qty">${m.cant}</span>
          <span class="tipo">${m.tipo}</span>
          <button class="del-maq" onclick="delMaqItem(${i})">✕</button>
        </div>`).join('');
}
function addMaqItem(){
  const cant = parseInt(document.getElementById('mMaqCant').value)||1;
  const tipo = (document.getElementById('mMaqTipo').value||'').trim();
  if(!tipo) return;
  // Si ya existe ese tipo, sumar
  const existing = _modalMaquinas.find(m=>m.tipo===tipo);
  if(existing){ existing.cant += cant; }
  else { _modalMaquinas.push({tipo, cant}); }
  document.getElementById('mMaqTipo').value = '';
  document.getElementById('mMaqCant').value = '1';
  renderMaqList();
}
function delMaqItem(i){
  _modalMaquinas.splice(i,1);
  renderMaqList();
}

function cerrarDetalle(){
  var ov=document.getElementById('detalleOverlay');
  if(ov)ov.remove();
}
function verDetalle(t){
  cerrarDetalle();
  var colores={suelo:'#D97706',encofrado:'#3B82F6',hormigon:'#6B7280',detalle:'#16A34A'};
  var color=t.cuadrilla?(colores[t.cuadrilla]||'#888'):'#888';
  var cuadNombre='';
  if(window._stateRef&&t.cuadrilla){
    var c=(window._stateRef.cuadrillas||[]).find(function(c){return c.id===t.cuadrilla;});
    if(c)cuadNombre=c.nombre;
  }
  var dur=t.inicio&&t.fin?Math.round((new Date(t.fin)-new Date(t.inicio))/86400000)+1:0;
  var maqStr=(t.maquinas||[]).map(function(m){return m.cant+'x '+m.tipo;}).join(', ');

  var ov=document.createElement('div');
  ov.id='detalleOverlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:flex;align-items:flex-end;justify-content:center;';
  ov.onclick=function(e){if(e.target===ov)ov.remove();};

  var card=document.createElement('div');
  card.style.cssText='background:var(--gris1,#1a1a1a);border-top:3px solid var(--naranja,#E8651A);border-radius:18px 18px 0 0;width:100%;max-width:560px;padding:20px 20px 36px;animation:slideUp .2s ease;';

  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;';
  var title=document.createElement('div');
  title.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:20px;font-weight:800;color:var(--texto,#f0f0f0);line-height:1.2;max-width:400px;';
  title.textContent=t.nombre;
  var closeBtn=document.createElement('button');
  closeBtn.textContent='✕';
  closeBtn.style.cssText='background:var(--gris2,#252525);border:1px solid var(--borde,#2e2e2e);color:var(--texto,#f0f0f0);border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;flex-shrink:0;';
  closeBtn.onclick=function(){ov.remove();};
  hdr.appendChild(title); hdr.appendChild(closeBtn);
  card.appendChild(hdr);

  // Filas de datos
  var body=document.createElement('div');
  body.style.cssText='display:flex;flex-direction:column;gap:0;';

  function addRow(label, value, html){
    var row=document.createElement('div');
    row.style.cssText='display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--borde,#2e2e2e);';
    var lbl=document.createElement('span');
    lbl.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gris5,#888);width:90px;flex-shrink:0;';
    lbl.textContent=label;
    var val=document.createElement('span');
    val.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:14px;color:var(--texto,#f0f0f0);';
    if(html) val.innerHTML=value; else val.textContent=value;
    row.appendChild(lbl); row.appendChild(val);
    body.appendChild(row);
  }

  if(t.sector) addRow('Sector', t.sector);
  if(cuadNombre) addRow('Cuadrilla', '<span style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;border-radius:20px;padding:2px 9px;font-size:12px;font-weight:700;">'+escHGlob(cuadNombre)+'</span>', true);
  if(t.inicio) addRow('Inicio', fmtDateES(t.inicio));
  if(t.fin) addRow('Fin', fmtDateES(t.fin));
  if(dur) addRow('Duración', dur+' días');
  if(t.personas) addRow('Personas', t.personas+'p');
  if(t.m3) addRow('Hormigón', t.m3+' m³');
  if(maqStr) addRow('Maquinaria', maqStr);
  if(t.descripcion) addRow('Descripción', t.descripcion);
  if(t.notas) addRow('Notas', t.notas);

  card.appendChild(body);
  ov.appendChild(card);
  document.body.appendChild(ov);
}

function aplicarPlantilla(cuadrillaId){
  // Buscar la plantilla de esa cuadrilla
  const cuad = (window._stateRef ? window._stateRef.cuadrillas : []).find(c=>c.id===cuadrillaId);
  const m3row = document.getElementById('mM3Wrap');
  if(m3row) m3row.style.display = cuadrillaId==='hormigon' ? 'flex' : 'none';
  if(!cuad || !cuad.plantilla) return;
  const p = cuad.plantilla;
  // Setear personas
  const persEl = document.getElementById('mPersonas');
  if(persEl) persEl.value = p.personas;
  // Setear máquinas
  window._modalMaquinas = (p.maquinas||[]).map(m=>Object.assign({},m));
  if(typeof renderMaqList === 'function') renderMaqList();
}

function toggleTema(){
  const root = document.documentElement;
  const isLight = root.getAttribute('data-theme') === 'light';
  root.setAttribute('data-theme', isLight ? '' : 'light');
  const btn = document.getElementById('btnTema');
  if(btn) btn.textContent = isLight ? '🌙' : '☀️';
  try{ localStorage.setItem('cf-tema', isLight ? 'dark' : 'light'); } catch(e){}
}

  } catch(e){}
})();

  function parseD(str){ if(!str) return new Date('2026-01-01T00:00:00'); const d=new Date(str+'T00:00:00'); return isNaN(d)?new Date('2026-01-01T00:00:00'):d; }
  function fmt(d){ if(!d||isNaN(d.getTime())) return '—'; return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}); }
  function iso(d){ const off = d.getTimezoneOffset(); const local = new Date(d.getTime()-off*60000); return local.toISOString().slice(0,10); }
  function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
  function mondayOf(d){ const r=new Date(d); const day=r.getDay(); return addDays(r,(day===0?-6:1-day)); }
  function daysBetween(a,b){ return Math.round((b-a)/86400000); }
  function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
  function uid(){ return 'f'+Math.random().toString(36).slice(2,9); }
  function allSectores(){ return state.grupos.flatMap(g=>g.sectores.map(s=>Object.assign({},s,{grupo:g.id, grupoColor:g.color}))); }
  function sectorInfo(id){ return allSectores().find(s=>s.id===id); }
  function sectorObj(id){ for(const g of state.grupos){ const s=g.sectores.find(x=>x.id===id); if(s) return s; } return null; }
  function cuadrillaInfo(id){ return state.cuadrillas.find(c=>c.id===id); }
  function taskById(id){ return state.tasks.find(t=>t.id===id); }
  function children(id){ return state.tasks.filter(t=>t.parentId===id); }
  function hasChildren(id){ return state.tasks.some(t=>t.parentId===id); }
  function overlapsRange(t){
    return (!state.rangoInicio || t.fin>=state.rangoInicio) && (!state.rangoFin || t.inicio<=state.rangoFin);
  }
  function taskVisibleInRange(t){
    return overlapsRange(t) || children(t.id).some(taskVisibleInRange);
  }
  function tasksInRange(){
    return state.tasks.filter(taskVisibleInRange);
  }
 
  let _deb = null;

  async function load(){
    // 1. Arrancar siempre con datos locales
    try{ render(); } catch(e){ console.error('render error:', e); }
    const el = document.getElementById('cfSyncStatus');
    if(el) el.textContent = 'Conectando...';
    try{
      const controller = new AbortController();
      const timer = setTimeout(()=>controller.abort(), 6000);
      const r = await fetch(GAS_URL + '?action=load', {signal: controller.signal});
      clearTimeout(timer);
      const d = await r.json();
      // Limpiar fechas del Sheet que puedan venir mal formateadas
      if(d && d.tasks) d.tasks = d.tasks.map(t=>{
        const fixDate = v => {
          if(!v) return '';
          const s = String(v).trim();
          // ya es YYYY-MM-DD
          if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
          // intentar parsear
          const dt = new Date(s);
          if(!isNaN(dt)) return dt.toISOString().slice(0,10);
          return '';
        };
        return Object.assign({}, t, {inicio: fixDate(t.inicio), fin: fixDate(t.fin)});
      }).filter(t=>t.inicio && t.fin);
      // Siempre usar el Sheet si tiene datos — las fechas modificadas están ahí
      if(d && d.tasks && d.tasks.length > 0){
        state = Object.assign(state, d);
        render();
        if(el) el.textContent = 'Sheet cargado (' + d.tasks.length + ' tareas)';
      } else {
        if(el) el.textContent = 'Datos locales — Sheet vacío';
      }
    } catch(e){
      if(el) el.textContent = 'Sin conexion — datos locales';
    }
  }

  async function save(){
    if(!IS_EDITOR) return;
    if(_deb) clearTimeout(_deb);
    const el = document.getElementById('cfSyncStatus');
    if(el) el.textContent = 'Guardando...';
    _deb = setTimeout(async () => {
      try{
        const r = await fetch(GAS_URL, { method:'POST',
          body: JSON.stringify({ action:'save', token:EDIT_TOKEN, state }) });
        const d = await r.json();
        if(el) el.textContent = d.ok ? 'Guardado en Sheet' : 'Error al guardar';
      } catch(e){ if(el) el.textContent = 'Sin conexion'; }
    }, 800);
  }
 
  function assignLanes(tasks){
    const sorted = tasks.slice().sort((a,b)=> a.inicio.localeCompare(b.inicio) || a.fin.localeCompare(b.fin));
    const lanesEnd = [];
    sorted.forEach(t=>{
      let placed=false;
      for(let i=0;i<lanesEnd.length;i++){ if(lanesEnd[i] < t.inicio){ t._lane=i; lanesEnd[i]=t.fin; placed=true; break; } }
      if(!placed){ t._lane=lanesEnd.length; lanesEnd.push(t.fin); }
    });
    return {tasks:sorted, laneCount: Math.max(lanesEnd.length,1)};
  }
  // ── Helpers OS ──
  function osEnRango(os){
    if(!os.inicio) return true; // sin fecha: siempre visible
    return (!state.rangoInicio || os.fin >= state.rangoInicio) &&
           (!state.rangoFin   || os.inicio <= state.rangoFin);
  }
  function sectorNombre(id){
    for(const g of state.grupos){ const s=g.sectores.find(x=>x.id===id); if(s) return s.nombre; }
    return id;
  }
  function osEstadoLabel(e){ return e==='realizado'?'Realizado':e==='pendiente'?'Pendiente':'Sin fecha'; }

  // ── Helpers Planos ──
  function guardarPlanos(){ save(); }

  function peaksByCuadrilla(){
    const map = {};
    state.cuadrillas.forEach(c=>{
      const ts = state.tasks.filter(t=>t.cuadrilla===c.id);
      map[c.id] = ts.length ? assignLanes(ts).laneCount : 0;
    });
    return map;
  }
 
  function flattenSector(sectorId){
    const rows = [];
    // Ordenar por fecha de inicio, pero con sort ESTABLE:
    // si dos tareas tienen el mismo padre, se mantiene el orden original entre ellas
    // Esto hace que PB→P1→P2→P3 se ordene por fecha pero cada tarea
    // mantiene su fila propia y no salta a otra fila al cambiar fechas
    function walk(parentId, depth){
      state.tasks
        .filter(t=>t.sector===sectorId && t.parentId===parentId && taskVisibleInRange(t))
        .sort((a,b)=>{
          const dateDiff = a.inicio.localeCompare(b.inicio);
          if(dateDiff !== 0) return dateDiff;
          // Desempate por orden original en el array
          return state.tasks.indexOf(a) - state.tasks.indexOf(b);
        })
        .forEach(t=>{
          rows.push({task:t, depth});
          if(!t.collapsed) walk(t.id, depth+1);
        });
    }
    walk(null,0);
    return rows;
  }
 
  function setAllCollapsed(taskCollapsed, sectorCollapsed){
    state.tasks.forEach(t=>{ if(hasChildren(t.id)) t.collapsed = taskCollapsed; });
    state.grupos.forEach(g=>g.sectores.forEach(s=>{ s.collapsed = sectorCollapsed; }));
    save(); render();
  }
  function clearRange(){
    state.rangoInicio = '';
    state.rangoFin = '';
    save(); render();
  }
  function nextDaysRange(days){
    const start = todayISO();
    state.rangoInicio = start;
    state.rangoFin = iso(addDays(parseD(start), days));
    save(); render();
  }
 
  function buildHeader(minDate, maxDate, zoom, today){
    const dw = ZOOMS[zoom].dw;
    const cells = [];
    if(zoom==='dia'){
      let d = new Date(minDate);
      while(d<=maxDate){
        const isToday = daysBetween(d,today)===0;
        const wd = d.getDay();
        cells.push({ width: dw, isToday, weekend: wd===0||wd===6,
          label: String(d.getDate()).padStart(2,'0'),
          sub: d.getDate()===1 || daysBetween(minDate,d)===0 ? d.toLocaleDateString('es-AR',{month:'short'}) : ['do','lu','ma','mi','ju','vi','sá'][wd] });
        d = addDays(d,1);
      }
    } else if(zoom==='semana'){
      let d = new Date(minDate);
      while(d<=maxDate){
        const isToday = today>=d && today<addDays(d,7);
        cells.push({ width: dw*7, isToday, label: fmt(d), sub:'sem' });
        d = addDays(d,7);
      }
    } else {
      let d = new Date(minDate);
      while(d<=maxDate){
        const monthEnd = new Date(d.getFullYear(), d.getMonth()+1, 0);
        const end = monthEnd<maxDate ? monthEnd : maxDate;
        const days = daysBetween(d,end)+1;
        const isToday = today>=d && today<=end;
        cells.push({ width: dw*days, isToday,
          label: d.toLocaleDateString('es-AR',{month:'short'}).replace('.',[]),
          sub: String(d.getFullYear()).slice(2) });
        d = addDays(end,1);
      }
    }
    return cells;
  }
 
  function render(){
    const root = document.getElementById('cfRoot');
    const hasTasks = state.tasks.length>0;
    const rangedTasks = tasksInRange().filter(t=>t.inicio && t.fin && t.inicio.length===10 && t.fin.length===10);
    const hasVisibleTasks = rangedTasks.length>0;
    const dw = ZOOMS[state.zoom].dw;
 
    let minDate, maxDate;
    if(hasVisibleTasks){
      minDate = state.rangoInicio ? parseD(state.rangoInicio) : parseD(rangedTasks.reduce((m,t)=>t.inicio&&t.inicio<m?t.inicio:m, rangedTasks[0]?.inicio||'2026-01-01'));
      let maxTask = rangedTasks.reduce((m,t)=>t.fin&&t.fin>m?t.fin:m, rangedTasks[0]?.fin||'2027-01-01');
      maxDate = parseD(state.fechaLimite && state.fechaLimite>maxTask ? state.fechaLimite : maxTask);
      if(state.rangoFin) maxDate = parseD(state.rangoFin);
    } else { minDate = new Date(); maxDate = addDays(minDate,28); }
    if(state.zoom==='mes'){
      minDate = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
      maxDate = new Date(maxDate.getFullYear(), maxDate.getMonth()+1, 0);
    } else {
      minDate = mondayOf(minDate);
      maxDate = addDays(mondayOf(maxDate),6);
    }
    const totalDays = Math.max(daysBetween(minDate,maxDate)+1,7);
    const today = new Date(); today.setHours(0,0,0,0);
    const todayOffset = daysBetween(minDate, today);
    const headerCells = buildHeader(minDate,maxDate,state.zoom,today);
    const timelineWidth = totalDays*dw;
    const gridCell = state.zoom==='dia' ? dw : dw*7;
 
    const maxFin = hasTasks ? state.tasks.reduce((m,t)=>t.fin>m?t.fin:m, state.tasks[0].fin) : null;
    const atRisk = state.fechaLimite && maxFin && maxFin > state.fechaLimite;
    const diasRestantes = state.fechaLimite ? daysBetween(today, parseD(state.fechaLimite)) : null;
    const peaks = peaksByCuadrilla();
    const peakTotal = Object.values(peaks).reduce((a,b)=>Math.max(a,b),0);
 
    // Build rows: sector header rows always visible + task rows
    let rowGroups = [];
    if(state.vista==='sector'){
      state.grupos.forEach(g=>{
        const rows = [];
        g.sectores.forEach(s=>{
          const sectorTasks = state.tasks.filter(t=>t.sector===s.id && taskVisibleInRange(t));
          rows.push({ type:'sector', sector:s, grupoColor:g.color, count:sectorTasks.length,
            range: sectorTasks.length ? {
              inicio: sectorTasks.reduce((m,t)=>t.inicio<m?t.inicio:m, sectorTasks[0].inicio),
              fin: sectorTasks.reduce((m,t)=>t.fin>m?t.fin:m, sectorTasks[0].fin) } : null });
          if(!s.collapsed){
            flattenSector(s.id).forEach(fr=>rows.push({ type:'task', task:fr.task, depth:fr.depth,
              hasKids:hasChildren(fr.task.id), collapsed:fr.task.collapsed }));
          }
        });
        rowGroups.push({ headerLabel:g.nombre, headerColor:g.color, rows });
      });
    } else if(state.vista==='cuadrilla') {
      rowGroups.push({ headerLabel:'Cuadrillas — carga de trabajo simultánea', headerColor:'var(--accent-orange)',
        rows: state.cuadrillas.map(c=>({ type:'cuadrilla', id:c.id, label:c.nombre, color:c.color,
          tasks: state.tasks.filter(t=>t.cuadrilla===c.id && overlapsRange(t)), peak: peaks[c.id]||0 })) });
    } else if(state.vista==='maquina') {
      const pkMaq = peakMaquinas();
      const tiposList = tiposMaquinas();
      rowGroups.push({ headerLabel:'Máquinas — uso por período', headerColor:'#7C3AED',
        rows: tiposList.map(tipo=>{
          // Para cada tipo, generar tareas sintéticas por instancia de uso
          const usos = [];
          state.tasks.filter(t=>overlapsRange(t)).forEach(t=>{
            (t.maquinas||[]).filter(m=>m.tipo===tipo).forEach(m=>{
              for(let i=0;i<m.cant;i++) usos.push(Object.assign({},t,{id:t.id+'_maq_'+tipo+'_'+i, cuadrilla:null, _maqTipo:tipo}));
            });
          });
          return { type:'cuadrilla', id:'maq_'+tipo, label:tipo, color:maqColor(tipo),
            tasks: usos, peak: pkMaq[tipo]||0 };
        })
      });
    }
    if(state.vista==='sector' && state.showCuadrillas){
      rowGroups.push({ headerLabel:'Resumen de cuadrillas', headerColor:'var(--accent-orange)',
        rows: state.cuadrillas.map(c=>({ type:'cuadrilla', id:c.id, label:c.nombre, color:c.color,
          tasks: state.tasks.filter(t=>t.cuadrilla===c.id && overlapsRange(t)), peak: peaks[c.id]||0 })) });
    }
 
    const todayLine = (todayOffset>=0 && todayOffset<=totalDays)
      ? `<div class="cf-todayline" style="left:${(todayOffset+0.5)/totalDays*100}%;"></div>` : '';
 
    function rowLabelHtml(r){
      if(r.type==='sector'){
        return `<div class="cf-rowlabel sectorrow">
          <span class="cf-toggle" data-toggle-sector="${r.sector.id}">${r.sector.collapsed?'▸':'▾'}</span>
          <span class="cf-dot" style="background:${r.grupoColor}"></span>
          <span class="rowname" data-rename-sector="${r.sector.id}" title="Doble click para renombrar">${escHtml(r.sector.nombre)}</span>
          <button class="cf-addsub" data-addsub-sector="${r.sector.id}" title="Agregar actividad en este sector">+</button>
        </div>`;
      }
      if(r.type==='task'){
        const c = r.task.cuadrilla ? cuadrillaInfo(r.task.cuadrilla) : null;
        return `<div class="cf-rowlabel ${r.depth===0&&r.hasKids?'parentrow':''} ${r.depth>0?'subrow':''}" style="padding-left:${24+r.depth*18}px;">
          <span class="cf-toggle ${r.hasKids?'':'leaf'}" data-toggle="${r.task.id}">${r.hasKids?(r.collapsed?'▸':'▾'):''}</span>
          ${c?`<span class="cf-dot" style="background:${c.color}"></span>`:'<span class="cf-dot" style="background:transparent;border:1px dashed var(--ink-dim);"></span>'}
          <span class="rowname" data-rename-task="${r.task.id}" title="Doble click para renombrar">${escHtml(r.task.nombre)}</span>
          <button class="cf-addsub" data-addsub-task="${r.task.id}" title="Agregar subactividad">+</button>
        </div>`;
      }
      const lc = r.tasks && r.tasks.length ? assignLanes(r.tasks).laneCount : 1;
      const h = lc*30+10;
      return `<div class="cf-rowlabel" style="height:${h}px;">
        <span class="cf-dot" style="background:${r.color}"></span>
        <span class="rowname">${escHtml(r.label)}</span>
        <span class="peakbadge">pico ${r.peak}</span>
      </div>`;
    }
 
    function trackHtml(r){
      if(r.type==='sector'){
        let summary = '';
        if(r.range){
          const start = daysBetween(minDate, parseD(r.range.inicio));
          const len = daysBetween(parseD(r.range.inicio),parseD(r.range.fin))+1;
          summary = `<div class="cf-sector-summary" style="left:${start/totalDays*100}%;width:${Math.max(len/totalDays*100,0.6)}%;background:${r.grupoColor};"></div>`;
        }
        return `<div class="cf-track sectortrack">${todayLine}${targetLineHtml(minDate,totalDays)}${summary}</div>`;
      }
      if(r.type==='task'){
        return `<div class="cf-track ${r.depth===0&&r.hasKids?'parenttrack':''} ${r.depth>0?'subtrack':''}">${todayLine}${targetLineHtml(minDate,totalDays)}${barHtml(r.task,minDate,totalDays,r.hasKids,state.vista)}</div>`;
      }
      const {tasks:laned, laneCount} = r.tasks && r.tasks.length ? assignLanes(r.tasks) : {tasks:[],laneCount:1};
      const h = laneCount*30+10;
      return `<div class="cf-track" style="height:${h}px;">${todayLine}${targetLineHtml(minDate,totalDays)}${laned.map(t=>{
          const smap = buildSectorMap();
          const labelOrig = t.nombre;
          t._barLabel = smap[t.sector] || labelOrig;
          const h = barHtml(t,minDate,totalDays,false,'cuadrilla');
          t._barLabel = null;
          return h;
        }).join('')}</div>`;
    }
 
    root.innerHTML = `
      <div class="cf-brandbar">
        <div class="cf-brand-left">
          <div class="ingemax-logo-box">${INGEMAX_SVG}</div>
          <span class="cf-brand-tag">Software de gestión<br>de obra civil</span>
        </div>
        <div class="cf-brand-right" style="display:flex;align-items:center;gap:10px;">
          <div class="cf-client-badge"><span class="lbl">Obra de</span><img src="${ALCO_LOGO}" alt="AlcoEnergy"/></div>
          <button onclick="abrirReporte()" style="background:rgba(232,101,26,.15);border:1px solid rgba(232,101,26,.45);color:var(--naranja,#E8651A);border-radius:7px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:800;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px;white-space:nowrap;">🖨 Reporte</button>
          <button onclick="abrirPlanos()" style="background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.45);color:#A78BFA;border-radius:7px;padding:6px 14px;font-family:Barlow Condensed,sans-serif;font-size:12px;font-weight:800;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px;white-space:nowrap;">📋 Planos</button>
          <span id="cfEditorBadge"></span>
          <span id="cfSyncStatus"></span>
          <button class="theme-toggle-btn" id="btnTema" title="Cambiar tema" onclick="toggleTema()">🌙</button>
        </div>
      </div>

      <div class="cf-header">
        <div class="cf-title-block">
          <div class="cf-eyebrow">Cronograma &middot; Obra Civil</div>
          <input class="cf-title" id="inpProyecto" value="${escAttr(state.proyecto)}" />
        </div>
        <div class="cf-stats">
          <div class="cf-stat"><span class="num">${state.tasks.length}</span><span class="lbl">Actividades / subact.</span></div>
          <div class="cf-stat alert"><span class="num">${peakTotal}</span><span class="lbl">Pico cuadrillas simult.</span></div>
          <div class="cf-stat ${diasRestantes!==null && diasRestantes<0 ? 'alert':''}"><span class="num">${diasRestantes===null?'—':diasRestantes}</span><span class="lbl">Días a la meta</span></div>
        </div>

            ${state.cuadrillas.map(c=>`<div class="cf-needchip"><span class="cf-dot" style="background:${c.color}"></span>${escHtml(c.nombre)}: <span class="peak">${peaks[c.id]||0}</span></div>`).join('')}
          </div>

          </div>

      ${atRisk ? `<div class="cf-needpanel" style="margin-top:-6px;"><div class="cf-needchip" style="border-color:var(--accent-orange); color:var(--accent-orange);">⚠ El frente más largo termina el ${fmt(parseD(maxFin))}, después de la fecha límite (${fmt(parseD(state.fechaLimite))}).</div></div>` : ''}
 
      <div class="cf-toolbar-section">
        <div class="cf-toolbar-label">Vista y zoom</div>
        <div class="cf-toolbar">
          <div class="cf-segmented">
            <button data-vista="sector" class="${state.vista==='sector'?'active':''}">Por Sector</button>
            <button data-vista="cuadrilla" class="${state.vista==='cuadrilla'?'active':''}">Por Cuadrilla</button>

            <button id="btnCloseAll">Cerrar todo</button>

          <div class="cf-field-inline" style="margin-left:auto;"><span>Meta</span><input type="date" id="inpLimite" value="${state.fechaLimite||''}" /></div>
        </div>
      </div>
      <div class="cf-toolbar-section">
        <div class="cf-toolbar-label">Acciones</div>
        <div class="cf-toolbar">
          <button class="cf-btn" id="btnAdd">+ Agregar actividad</button>

        <div class="cf-field-inline"><span>hasta</span><input type="date" id="inpRangoFin" value="${state.rangoFin||''}" /></div>
        <button class="cf-btn ghost mini" id="btnRange90">Prox. 90 dias</button>
        <button class="cf-btn ghost mini" id="btnRangeAll">Obra completa</button>
      </div>      <div class="cf-hint">💡 Doble click en un nombre para renombrar · Arrastrá los bordes de una barra para cambiar fechas · Filtrá por rango con "Ver desde / hasta"</div>
 
      <div class="cf-gantt-wrap"><div class="cf-gantt">

  function inlineRename(el, obj){
    if(!obj) return;
    const input = document.createElement('input');
    input.className = 'cf-rename-input';
    input.value = obj.nombre;
    el.replaceWith(input);
    input.focus(); input.select();
    let done = false;
    function commit(cancel){
      if(done) return; done = true;
      const v = input.value.trim();
      if(!cancel && v) obj.nombre = v;
      save(); render();
    }
    input.addEventListener('keydown', (e)=>{
      if(e.key==='Enter') commit(false);
      if(e.key==='Escape') commit(true);
    });
    input.addEventListener('blur', ()=>commit(false));
  }
 
  function deleteWithChildren(id){

    state.tasks = state.tasks.filter(t=>t.id!==id);

  function targetLineHtml(minDate,totalDays){
    if(!state.fechaLimite) return '';
    const offset = daysBetween(minDate, parseD(state.fechaLimite));
    if(offset<0||offset>totalDays) return '';
    return `<div class="cf-target-line" style="left:${(offset/totalDays)*100}%;"><span class="cf-target-flag">META</span></div>`;
  }
 
  // ── MÁQUINAS ──
  function allMaquinasEnRango(){
    const map = {};
    state.tasks.filter(t=>t.maquinas && t.maquinas.length && overlapsRange(t)).forEach(t=>{
      t.maquinas.forEach(m=>{
        if(!map[m.tipo]) map[m.tipo] = [];
        map[m.tipo].push({task:t, cant:m.cant, inicio:t.inicio, fin:t.fin});
      });
    });
    return map;
  }
  function peakMaquinas(){
    const allMaq = allMaquinasEnRango();
    const peaks = {};
    Object.keys(allMaq).forEach(tipo=>{
      const items = allMaq[tipo].sort((a,b)=>a.inicio.localeCompare(b.inicio));
      let maxAct = 0;
      items.forEach(item=>{
        let activos = 0;
        items.forEach(other=>{
          if(other.inicio <= item.inicio && other.fin >= item.inicio) activos += other.cant;
        });
        maxAct = Math.max(maxAct, activos);
      });
      peaks[tipo] = maxAct;
    });
    return peaks;
  }
  function tiposMaquinas(){
    const tipos = new Set();
    state.tasks.forEach(t=>{ (t.maquinas||[]).forEach(m=>{ if(m.tipo) tipos.add(m.tipo); }); });
    return [...tipos].sort();
  }
  const MAQ_COLORS = ['#7C3AED','#0891B2','#BE185D','#065F46','#92400E','#1E3A8A','#713F12','#064E3B'];
  function maqColor(tipo){
    const tipos = tiposMaquinas();
    return MAQ_COLORS[tipos.indexOf(tipo) % MAQ_COLORS.length] || '#6B7280';
  }

  // Mapa global sector_id -> nombre para uso en barHtml

  function barHtml(t,minDate,totalDays,isParent,vistaActual){
    const c = t.cuadrilla ? cuadrillaInfo(t.cuadrilla) : null;
    const start = daysBetween(minDate, parseD(t.inicio));
    const len = daysBetween(parseD(t.inicio),parseD(t.fin))+1;
    const left = (start/totalDays)*100, width = Math.max((len/totalDays)*100,0.6);
    // En vista sector cada tarea tiene su fila propia — siempre top:5px
    // Solo usar _lane en vista cuadrilla/maquina donde assignLanes apila barras
    const top = (vistaActual === 'sector') ? 5 : 5 + (t._lane||0)*30;
    const bg = isParent ? '' : `background:${c?c.color:'#7C8896'};border-left-color:${sectorInfo(t.sector)?sectorInfo(t.sector).grupoColor:'transparent'};`;
    const _maqTip = (t.maquinas||[]).map(m=>m.cant+'×'+m.tipo).join(', ');
    const tooltip = [t.nombre, t.inicio+' → '+t.fin, t.descripcion, t.personas?(t.personas+' personas'):'', _maqTip].filter(Boolean).join(' | ');
    const maqStr = (t.maquinas||[]).map(m=>m.cant+'×'+m.tipo).join(', ');
    const m3Badge = (t.cuadrilla==='hormigon' && t.m3) ? `<span style="margin-left:6px;font-size:9px;opacity:0.9;font-weight:800;">${t.m3}m³</span>` : '';
    const resourceBadge = (t.personas||maqStr) ? `<span style="margin-left:6px;font-size:9px;opacity:0.75;font-weight:400;">${t.personas?t.personas+'p':''} ${maqStr?'· '+maqStr:''}</span>` : '';
    // Etiqueta: usar _barLabel si fue seteado (vista cuadrilla), sino t.nombre
    const barLabel = (t._barLabel && !isParent) ? t._barLabel : t.nombre;
    return `<div class="cf-bar ${isParent?'parentbar':''}" style="left:${left}%;width:${width}%;top:${top}px;${bg}" data-task="${t.id}" title="${escAttr(tooltip)}">
      <span class="cf-handle left" data-mode="left" data-task="${t.id}"></span>
      <span class="cf-bar-label">${escHtml(barLabel)}${m3Badge}${resourceBadge}</span>
      <span class="cf-handle right" data-mode="right" data-task="${t.id}"></span>
    </div>`;
  }
 
  function attachDrag(){
    if(!IS_EDITOR) return;
    const timeline = document.getElementById('cfTimeline');
    if(!timeline) return;
    const dayWidth = parseFloat(timeline.dataset.daywidth);
    timeline.querySelectorAll('.cf-handle').forEach(h=>{
      h.addEventListener('pointerdown', (e)=>{ e.stopPropagation(); e.preventDefault(); startDrag(e, h.dataset.task, h.dataset.mode, dayWidth); });
    });
    timeline.querySelectorAll('.cf-bar').forEach(b=>{
      b.addEventListener('pointerdown', (e)=>{ if(e.target.classList.contains('cf-handle')) return; e.preventDefault(); startDrag(e, b.dataset.task, 'move', dayWidth); });
    });
  }
  function startDrag(e, taskId, mode, dayWidth){
    const t = taskById(taskId); if(!t) return;
    const parent = t.parentId ? taskById(t.parentId) : null;
    drag = { taskId, mode, dayWidth, startX:e.clientX, origInicio:t.inicio, origFin:t.fin,
      parentInicio: parent?parent.inicio:null, parentFin: parent?parent.fin:null, moved:false };
    const el = document.querySelector('.cf-bar[data-task="'+taskId+'"]');
    if(el) el.classList.add('dragging');
    window.addEventListener('pointermove', onDragMove);
    window.addEventListener('pointerup', onDragEnd);
  }
  function onDragMove(e){
    if(!drag) return;
    const deltaPx = e.clientX - drag.startX;
    if(Math.abs(deltaPx)>3) drag.moved = true;
    let deltaDays = Math.round(deltaPx / drag.dayWidth);
    const origInicioD = parseD(drag.origInicio), origFinD = parseD(drag.origFin);
    let newInicio = drag.origInicio, newFin = drag.origFin;
    if(drag.mode==='move'){
      let minDelta = drag.parentInicio ? daysBetween(origInicioD, parseD(drag.parentInicio)) : -99999;
      let maxDelta = drag.parentFin ? daysBetween(origFinD, parseD(drag.parentFin)) : 99999;
      deltaDays = clamp(deltaDays, minDelta, maxDelta);
      newInicio = iso(addDays(origInicioD, deltaDays));
      newFin = iso(addDays(origFinD, deltaDays));
    } else if(drag.mode==='left'){
      let minDelta = drag.parentInicio ? daysBetween(origInicioD, parseD(drag.parentInicio)) : -99999;
      let maxDelta = daysBetween(origInicioD, addDays(origFinD,-1));
      deltaDays = clamp(deltaDays, minDelta, maxDelta);
      newInicio = iso(addDays(origInicioD, deltaDays));
    } else if(drag.mode==='right'){
      let minDelta = daysBetween(origFinD, addDays(origInicioD,1));
      let maxDelta = drag.parentFin ? daysBetween(origFinD, parseD(drag.parentFin)) : 99999;
      deltaDays = clamp(deltaDays, minDelta, maxDelta);
      newFin = iso(addDays(origFinD, deltaDays));
    }
    drag.pendingInicio = newInicio; drag.pendingFin = newFin;
    const el = document.querySelector('.cf-bar[data-task="'+drag.taskId+'"]');
    const timeline = document.getElementById('cfTimeline');
    if(el && timeline){
      const minDate = parseD(timeline.dataset.min);
      const totalDays = timeline.offsetWidth / drag.dayWidth;
      const start = daysBetween(minDate, parseD(newInicio));
      const len = daysBetween(parseD(newInicio),parseD(newFin))+1;
      el.style.left = (start/totalDays*100)+'%';
      el.style.width = Math.max((len/totalDays*100),0.6)+'%';
    }
    showHint(e.clientX, e.clientY, newInicio, newFin);
  }
  function showHint(x,y,inicio,fin){
    let hint = document.getElementById('cfDragHint');
    if(!hint){ hint = document.createElement('div'); hint.id='cfDragHint'; hint.className='cf-draghint'; document.body.appendChild(hint); }
    hint.style.left = (x+14)+'px'; hint.style.top=(y+14)+'px';
    hint.textContent = fmt(parseD(inicio))+' → '+fmt(parseD(fin));
  }
  function removeHint(){ const h=document.getElementById('cfDragHint'); if(h) h.remove(); }
  function onDragEnd(){
    window.removeEventListener('pointermove', onDragMove);
    window.removeEventListener('pointerup', onDragEnd);
    removeHint();
    if(!drag) return;
    const el = document.querySelector('.cf-bar[data-task="'+drag.taskId+'"]');
    if(el) el.classList.remove('dragging');
    if(drag.moved && drag.pendingInicio){
      const t = taskById(drag.taskId);
      if(t){
        t.inicio = drag.pendingInicio; t.fin = drag.pendingFin;
        children(t.id).forEach(k=>{
          if(k.inicio<t.inicio) k.inicio=t.inicio;
          if(k.fin>t.fin) k.fin=t.fin;
          if(k.inicio>k.fin) k.inicio=k.fin;
        });
        save();
      }
      render();
    } else if(!drag.moved){
      openModal(taskById(drag.taskId), null);
    }
    drag = null;
  }

    state.cuadrillas.push({id:uid(), nombre, color:palette[state.cuadrillas.length%palette.length]});
    save(); render();

  function addSector(){
    const gruposNombres = state.grupos.map((g,i)=>`${i+1}) ${g.nombre}`).join('\n');
    const gsel = prompt('¿A qué grupo pertenece el nuevo sector?\n'+gruposNombres);

    state.grupos[idx].sectores.push({id:uid(), nombre, collapsed:false});
    save(); render();
  }
