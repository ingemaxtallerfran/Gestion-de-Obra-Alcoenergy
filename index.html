          ${state.grupos.map(g=>`<optgroup label="${escAttr(g.nombre)}">${g.sectores.map(s=>`<option value="${s.id}" ${(t&&t.sector===s.id)||fixedSector===s.id?'selected':''}>${escHtml(s.nombre)}</option>`).join('')}</optgroup>`).join('')}
        </select></div>`;
    backdrop.innerHTML = `
      <div class="cf-modal">
        <h3>${isEdit?'Editar tarea':(parent?'Nueva subactividad':'Nueva actividad')}</h3>
        <div class="ctx">${parent?('Dentro de: '+escHtml(parent.nombre)+' · '+fmt(parseD(parent.inicio))+' – '+fmt(parseD(parent.fin))):'Actividad de nivel superior (define el rango madre)'}</div>
        <div class="cf-form-row"><label>Nombre</label><input id="mNombre" placeholder="Ej: Vigas +6m" value="${t?escAttr(t.nombre):''}"/></div>
        ${sectorSelectHtml}
        <div class="cf-form-row"><label>Cuadrilla (vacío = tarea madre o contratista)</label>
          <select id="mCuadrilla" onchange="aplicarPlantilla(this.value)" ><option value="">— sin asignar —</option>${state.cuadrillas.map(c=>`<option value="${c.id}" ${t&&t.cuadrilla===c.id?'selected':''}>${escHtml(c.nombre)}</option>`).join('')}</select>
          <button type="button" onclick="aplicarPlantilla(document.getElementById('mCuadrilla').value)" style="margin-top:6px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;background:var(--naranja-dim);border:1px solid var(--naranja);color:var(--naranja);padding:5px 12px;border-radius:var(--rsm);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;">↺ Precargar plantilla de cuadrilla</button>
        </div>
        <div class="cf-form-row-2">
          <div class="cf-form-row"><label>Inicio</label><input type="date" id="mInicio" value="${t?t.inicio:(parent?parent.inicio:todayISO())}"/></div>
          <div class="cf-form-row"><label>Fin</label><input type="date" id="mFin" value="${t?t.fin:(parent?parent.fin:todayISO())}"/></div>
        </div>
        <div class="cf-form-row"><label>Descripción / Tareas específicas</label><textarea id="mDesc" rows="2" placeholder="Ej: Sacar 40cm suelo, tirar cal, compactar">${t?escHtml(t.descripcion||''):''}</textarea></div>
        <div class="cf-form-row-2">
          <div class="cf-form-row"><label>Personas necesarias</label><input type="number" id="mPersonas" min="0" value="${t?(t.personas||0):0}" placeholder="0"/></div>
          <div class="cf-form-row" id="mM3Wrap" style="display:${(t&&t.cuadrilla==='hormigon')?'flex':'none'};flex-direction:column;gap:5px;"><label style="font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gris5,#888);">Volumen hormig&oacute;n (m&sup3;)</label><input type="number" id="mM3" min="0" step="0.5" value="${t&&t.m3?t.m3:''}" placeholder="Ej: 12.5" style="background:var(--gris2);border:1px solid var(--borde);color:var(--texto);padding:10px 12px;border-radius:var(--rsm);font-family:'Barlow',sans-serif;font-size:15px;outline:none;width:100%;"/></div>
          <div class="cf-form-row" style="flex:1;"><label>Máquinas</label><div id="mMaqList" class="cf-maq-list"></div><div class="cf-maq-add"><input type="number" class="qty-inp" id="mMaqCant" min="1" value="1" placeholder="Cant"/><input class="tipo-inp" id="mMaqTipo" placeholder="Ej: Minicargadora" list="maqSuggest" autocomplete="off"/><datalist id="maqSuggest"></datalist><button type="button" onclick="addMaqItem()">+</button></div></div>
        </div>
        <div class="cf-form-row"><label>Notas (opcional)</label><textarea id="mNotas" rows="1">${t?escHtml(t.notas||''):''}</textarea></div>
        <div class="cf-modal-actions">
          <div>${isEdit?'<button class="cf-btn ghost" id="mDelete" style="border-color:#D64545;color:#D64545;">Eliminar</button>':''}</div>
          <div class="right"><button class="cf-btn ghost" id="mCancel">Cancelar</button><button class="cf-btn" id="mSave">${isEdit?'Guardar cambios':'Agregar'}</button></div>
        </div>
      </div>`;
    document.body.appendChild(backdrop);
    // Inicializar máquinas del modal
    _modalMaquinas = t ? JSON.parse(JSON.stringify(t.maquinas||[])) : [];
    renderMaqList();
    document.getElementById('mMaqTipo').addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); addMaqItem(); } });
    document.getElementById('mCancel').onclick = ()=>backdrop.remove();
    backdrop.onclick = (e)=>{ if(e.target===backdrop) backdrop.remove(); };
    if(isEdit){ document.getElementById('mDelete').onclick = ()=>{ if(confirm('¿Eliminar esta tarea y sus subactividades?')){ deleteWithChildren(t.id); save(); backdrop.remove(); render(); } }; }
    document.getElementById('mSave').onclick = ()=>{
      const nombre = document.getElementById('mNombre').value.trim();
      const sector = document.getElementById('mSector').value;
      const cuadrilla = document.getElementById('mCuadrilla').value || null;
      let inicio = document.getElementById('mInicio').value;
      let fin = document.getElementById('mFin').value;
      const notas = document.getElementById('mNotas').value.trim();
      const descripcion = document.getElementById('mDesc').value.trim();
      const personas = parseInt(document.getElementById('mPersonas').value)||0;
      const m3El=document.getElementById('mM3'); const m3v=m3El?parseFloat(m3El.value)||0:0;
      const maquinas = [..._modalMaquinas]; // copia del array temporal
      if(!nombre||!inicio||!fin){ alert('Completá al menos nombre, inicio y fin.'); return; }
      if(fin<inicio){ alert('La fecha de fin no puede ser anterior al inicio.'); return; }
      if(parent){
        if(inicio<parent.inicio) inicio = parent.inicio;
        if(fin>parent.fin) fin = parent.fin;
      }
      if(isEdit){ Object.assign(t,{nombre,sector,cuadrilla,inicio,fin,notas,descripcion,personas,maquinas,m3:m3v}); }
      else{
        state.tasks.push({id:uid(),nombre,sector,cuadrilla,inicio,fin,notas,descripcion,personas,maquinas,m3:m3v,parentId: parent?parent.id:null, collapsed:false});
        if(parent) parent.collapsed = false;
        const so = sectorObj(sector); if(so) so.collapsed = false;
      }
      save(); backdrop.remove(); render();
    };
  }

  function escAttr(s){ return String(s).replace(/"/g,'&quot;'); }

  // Wrappear render para aplicar UI de editor después de cada render
  const _renderBase = render;
  render = function(){
    _renderBase();
    // Sincronizar botón de tema
    const btnT = document.getElementById('btnTema');
    if(btnT) btnT.textContent = document.documentElement.getAttribute('data-theme')==='light' ? '☀️' : '🌙';
    // Aplicar UI de editor/lectura sin disparar save()
    const b = document.getElementById('cfEditorBadge');
    if(b){ b.textContent = IS_EDITOR ? 'EDITOR' : 'Solo lectura';
           b.style.color = IS_EDITOR ? 'var(--accent-orange)' : 'var(--ink-dim)';
           b.style.border = IS_EDITOR ? '1px solid var(--accent-orange)' : '1px solid var(--grid-line-strong)'; }

      ['btnAdd','btnAddSector','btnAddCuadrilla','btnReset']
        .forEach(id=>{ const e=document.getElementById(id); if(e) e.style.display='none'; });
      document.querySelectorAll('.cf-addsub').forEach(e=>e.style.display='none');
      document.querySelectorAll('[data-del]').forEach(e=>e.style.display='none');
    }
  };

  // Exponer state y cuadrillas para funciones globales (plantillas)
  window._stateRef = state; // referencia inmediata
  window.IS_EDITOR_GLOBAL = IS_EDITOR;
  const _origLoad = load;
  load = async function(){
    await _origLoad();
    window._stateRef = state;
  };
  const _origSave = save;
  save = async function(){
    window._stateRef = state;
    return _origSave();
  };

  load();
})();
